<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='40' cy='40' r='2'/%3E%3Cpath d='M80 0v80H0V0h80zm-5 5H5v70h70V5z'/%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.8);
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: monospace;
            resize: vertical;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .btn-primary:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            font-weight: 500;
        }
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .hidden {
            display: none;
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-8">
    <div class="container space-y-8">
        <!-- Main Prediction Card -->
        <div class="card">
            <h1 class="text-3xl font-bold mb-4 text-center">Admin Dashboard</h1>
            <p class="text-gray-600 mb-6 text-center">Enter EEG data (178 comma-separated values) to get a seizure prediction.</p>
            <div class="input-group">
                <label for="eeg-data">EEG Data:</label>
                <textarea id="eeg-data" rows="8" placeholder="e.g., 1, 2, 3, 4, ..."></textarea>
            </div>
            <div class="flex items-center space-x-4">
                <button id="predict-btn" class="btn btn-primary flex-1">Get Prediction</button>
                <div id="loading-indicator" class="hidden loading-spinner"></div>
            </div>
            <div id="prediction-result" class="alert mt-4 hidden" role="alert"></div>
        </div>

        <!-- User Management Card -->
        <div class="card">
            <h2 class="text-2xl font-bold mb-4 text-center">User Management</h2>
            <div id="user-management-message" class="alert mb-4 hidden" role="alert"></div>
            <div class="overflow-x-auto">
                <table id="users-table" class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- User rows will be populated here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const predictBtn = document.getElementById('predict-btn');
            const eegDataInput = document.getElementById('eeg-data');
            const predictionResult = document.getElementById('prediction-result');
            const usersTableBody = document.getElementById('users-table-body');
            const userManagementMessage = document.getElementById('user-management-message');
            const loadingIndicator = document.getElementById('loading-indicator');

            // Fetches all users and populates the table
            async function fetchUsers() {
                try {
                    const response = await fetch('/get_users');
                    const users = await response.json();
                    if (response.ok) {
                        renderUsersTable(users);
                    } else {
                        displayUserManagementMessage(users.error || "Failed to fetch users.", 'error');
                    }
                } catch (error) {
                    displayUserManagementMessage("An error occurred while fetching users.", 'error');
                }
            }

            // Renders the user table with fetched data
            function renderUsersTable(users) {
                usersTableBody.innerHTML = '';
                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">${user.email}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <select class="role-select border rounded-md p-1">
                                <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                            <button data-email="${user.email}" class="update-btn text-indigo-600 hover:text-indigo-900">Update</button>
                            <button data-email="${user.email}" class="delete-btn text-red-600 hover:text-red-900">Delete</button>
                        </td>
                    `;
                    usersTableBody.appendChild(row);
                });

                // Attach event listeners to the new buttons
                document.querySelectorAll('.update-btn').forEach(button => {
                    button.addEventListener('click', handleUpdateUser);
                });
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', handleDeleteUser);
                });
            }

            // Handles updating a user's role
            async function handleUpdateUser(event) {
                const email = event.target.dataset.email;
                const role = event.target.closest('tr').querySelector('.role-select').value;
                try {
                    const response = await fetch('/update_user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, role }),
                    });
                    const result = await response.json();
                    if (response.ok) {
                        displayUserManagementMessage("User role updated successfully!", 'success');
                        fetchUsers(); // Refresh the table
                    } else {
                        displayUserManagementMessage(result.error || "Failed to update user role.", 'error');
                    }
                } catch (error) {
                    displayUserManagementMessage("An error occurred while updating the user.", 'error');
                }
            }

            // Handles deleting a user
            async function handleDeleteUser(event) {
                const email = event.target.dataset.email;
                try {
                    const response = await fetch('/delete_user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email }),
                    });
                    const result = await response.json();
                    if (response.ok) {
                        displayUserManagementMessage("User deleted successfully!", 'success');
                        fetchUsers(); // Refresh the table
                    } else {
                        displayUserManagementMessage(result.error || "Failed to delete user.", 'error');
                    }
                } catch (error) {
                    displayUserManagementMessage("An error occurred while deleting the user.", 'error');
                }
            }

            // Handles the prediction button click
            predictBtn.addEventListener('click', async () => {
                const eegData = eegDataInput.value;
                const dataArray = eegData.split(',').map(val => parseFloat(val.trim()));

                predictionResult.classList.add('hidden'); // Hide previous result
                predictBtn.disabled = true;
                predictBtn.textContent = 'Predicting...';
                loadingIndicator.classList.remove('hidden');

                if (dataArray.length !== 178 || dataArray.some(isNaN)) {
                    displayPredictionResult("Error: Please enter exactly 178 comma-separated numerical values.", 'error');
                    predictBtn.textContent = 'Get Prediction';
                    predictBtn.disabled = false;
                    loadingIndicator.classList.add('hidden');
                    return;
                }

                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ eeg_data: dataArray }),
                    });
                    const result = await response.json();

                    if (response.ok) {
                        if (result.prediction === 1) {
                            displayPredictionResult("Prediction: Epileptic Seizure detected.", 'error');
                        } else {
                            displayPredictionResult("Prediction: No seizure detected.", 'success');
                        }
                    } else {
                        displayPredictionResult(result.error || "Prediction failed.", 'error');
                    }
                } catch (error) {
                    displayPredictionResult("An error occurred during prediction.", 'error');
                    console.error("Prediction error:", error);
                } finally {
                    predictBtn.textContent = 'Get Prediction';
                    predictBtn.disabled = false;
                    loadingIndicator.classList.add('hidden');
                }
            });

            // Function to display prediction results
            function displayPredictionResult(message, type) {
                predictionResult.textContent = message;
                predictionResult.className = `alert mt-4 ${type === 'success' ? 'alert-success' : 'alert-error'}`;
                predictionResult.classList.remove('hidden');
            }

            // Function to display user management messages
            function displayUserManagementMessage(message, type) {
                userManagementMessage.textContent = message;
                userManagementMessage.className = `alert mb-4 ${type === 'success' ? 'alert-success' : 'alert-error'}`;
                userManagementMessage.classList.remove('hidden');
            }

            fetchUsers();
        });
    </script>
</body>
</html>
