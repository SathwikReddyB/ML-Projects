<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Healthcare Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .input-focus {
            transition: all 0.3s ease;
        }
        .input-focus:focus {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .floating-label {
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .form-group input:focus + .floating-label,
        .form-group input:not(:placeholder-shown) + .floating-label {
            transform: translateY(-24px) scale(0.875);
            color: #4f46e5;
            font-weight: 500;
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    
    <!-- Background decorations -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl"></div>
    </div>

    <!-- Main container -->
    <div class="relative w-full max-w-md">
        <!-- Logo/Brand section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg mb-4">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Join Our Platform</h1>
            <p class="text-indigo-100">Create your patient account</p>
        </div>

        <!-- Registration form -->
        <div class="glass-effect rounded-2xl shadow-2xl p-8 border border-white/20">
            
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-lg">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-red-700 text-sm font-medium">{{ error }}</p>
                </div>
            </div>
            {% endif %}

            <form action="{{ url_for('register') }}" method="post" class="space-y-6">
                
                <!-- Username field -->
                <div class="form-group relative">
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        placeholder=" "
                        class="input-focus w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-transparent focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent peer"
                    >
                    <label 
                        for="username" 
                        class="floating-label absolute left-4 top-3 text-gray-500 transition-all duration-300 peer-focus:text-indigo-500"
                    >
                        Username
                    </label>
                </div>

                <!-- Password field -->
                <div class="form-group relative">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder=" "
                        class="input-focus w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-transparent focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent peer"
                    >
                    <label 
                        for="password" 
                        class="floating-label absolute left-4 top-3 text-gray-500 transition-all duration-300 peer-focus:text-indigo-500"
                    >
                        Password
                    </label>
                </div>

                <!-- Terms and conditions -->
                <div class="flex items-start space-x-3">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        required 
                        class="mt-1 w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
                    >
                    <label for="terms" class="text-sm text-gray-600 leading-5">
                        I agree to the 
                        <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Terms of Service</a> 
                        and 
                        <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit button -->
                <button 
                    type="submit" 
                    class="w-full bg-indigo-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transform transition duration-200 hover:scale-105 active:scale-95"
                >
                    <span class="flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                        </svg>
                        Create Patient Account
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">Already registered?</span>
                </div>
            </div>

            <!-- Login link -->
            <div class="text-center">
                <a 
                    href="{{ url_for('login') }}" 
                    class="inline-flex items-center text-indigo-600 hover:text-indigo-500 font-medium transition-colors duration-200"
                >
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    Sign in to existing account
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-indigo-100 text-sm">
            <p>Secure • Professional • Trusted</p>
        </div>
    </div>
</body>
</html>
