<!DOCTYPE: html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Prediction</title>
    <!-- Use Tailwind CSS for a clean, responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 600px;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Main application container with a modern card design -->
    <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-200 w-full container">
        <h1 class="text-4xl font-extrabold text-center mb-6 text-gray-900">
            Stroke Prediction from Neuroimage
        </h1>
        <p class="text-center text-gray-600 mb-8">
            Upload a CT-Scan image to predict the likelihood of a stroke.
        </p>

        <!-- Image upload and preview section -->
        <div class="space-y-4 mb-6">
            <label class="block text-sm font-medium text-gray-700">Upload Image</label>
            <input 
                id="image-upload" 
                type="file" 
                accept="image/*" 
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
            />
            
            <!-- Image preview container -->
            <div id="preview-container" class="mt-4 hidden border-2 border-dashed border-gray-300 rounded-lg overflow-hidden p-2 text-center">
                <img id="image-preview" src="" alt="Image Preview" class="mx-auto max-h-64 object-contain rounded-md" />
            </div>
        </div>

        <!-- Predict button -->
        <button 
            id="predict-btn" 
            class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 transform hover:scale-105"
        >
            Predict
        </button>

        <!-- Result display section -->
        <div id="result-container" class="mt-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Prediction Result</h2>
            <div id="prediction-box" class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                <p id="prediction-text" class="text-xl font-semibold text-gray-700"></p>
                <p id="confidence-text" class="text-sm text-gray-500 mt-2"></p>
            </div>
        </div>

        <!-- Error/Status message box -->
        <div id="status-message" class="mt-6 hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
            <span id="status-text" class="block sm:inline"></span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const imageUpload = document.getElementById('image-upload');
            const imagePreview = document.getElementById('image-preview');
            const previewContainer = document.getElementById('preview-container');
            const predictBtn = document.getElementById('predict-btn');
            const resultContainer = document.getElementById('result-container');
            const predictionText = document.getElementById('prediction-text');
            const confidenceText = document.getElementById('confidence-text');
            const statusMessage = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');

            let uploadedFile = null;

            // --- Utility Functions ---
            const showStatus = (message, isError = false) => {
                statusText.textContent = message;
                statusMessage.classList.remove('hidden', 'bg-red-100', 'bg-green-100', 'border-red-400', 'border-green-400', 'text-red-700', 'text-green-700');
                if (isError) {
                    statusMessage.classList.add('bg-red-100', 'border-red-400', 'text-red-700');
                } else {
                    statusMessage.classList.add('bg-green-100', 'border-green-400', 'text-green-700');
                }
            };
            
            // --- Event Listeners ---
            imageUpload.addEventListener('change', (event) => {
                uploadedFile = event.target.files[0];
                if (uploadedFile) {
                    const fileURL = URL.createObjectURL(uploadedFile);
                    imagePreview.src = fileURL;
                    previewContainer.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                    statusMessage.classList.add('hidden');
                }
            });

            predictBtn.addEventListener('click', async () => {
                if (!uploadedFile) {
                    showStatus('Please select an image file first.', true);
                    return;
                }
                resultContainer.classList.add('hidden');
                showStatus('Predicting... Please wait.', false);
                
                const formData = new FormData();
                formData.append('file', uploadedFile);

                try {
                    // Send image to the /predict endpoint on the same server
                    const response = await fetch('/predict', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();

                    predictionText.textContent = data.prediction;
                    const confidencePercentage = (data.confidence * 100).toFixed(2);
                    confidenceText.textContent = `Confidence: ${confidencePercentage}%`;
                    
                    const predictionBox = document.getElementById('prediction-box');
                    predictionBox.classList.remove('bg-gray-50', 'bg-red-100', 'bg-green-100');
                    predictionBox.classList.remove('border-red-400', 'border-green-400');
                    if (data.prediction === 'Stroke') {
                        predictionBox.classList.add('bg-red-100', 'border-red-400');
                    } else {
                        predictionBox.classList.add('bg-green-100', 'border-green-400');
                    }
                    
                    resultContainer.classList.remove('hidden');
                    statusMessage.classList.add('hidden');

                } catch (error) {
                    showStatus(`Error: ${error.message}. Please ensure the backend server is running.`, true);
                    resultContainer.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
